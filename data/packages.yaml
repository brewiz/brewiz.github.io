    tags: [hardware]
    info: >-
      Logitech Options+ is software for Logitech devices that provides customization and control over the device's features. It enhances the user experience and workflow for Logitech peripherals.
  - id: homebrew/cask/loupedeck
    tags: [hardware]
    info: >-
      Loupedeck is a software suite for Loupedeck consoles, providing customization and control over the console's features. It enhances the user experience and workflow for creative professionals.
  - id: homebrew/cask/maccy
    tags: [productivity, macos, utility]
    info: >-
      Maccy is a lightweight clipboard manager for macOS that keeps track of your copy history. It provides quick access to your clipboard history through a simple interface and keyboard shortcuts.
  - id: homebrew/cask/raycast
    tags: [productivity, utility, workflow]
    info: >-
      Raycast is a productivity tool for macOS that lets you control your computer with keyboard commands. It provides quick access to applications, system settings, and custom scripts while being highly extensible through store extensions.
  - id: homebrew/cask/rectangle
    tags: [macos, productivity, window-management, utility]
    info: >-
      Rectangle is a window management app that allows you to move and resize windows using keyboard shortcuts or by dragging to screen edges. It helps organize your workspace efficiently.
  - id: homebrew/core/trash
    tags: [file-management, command-line, utility]
    info: >-
      trash is a command-line tool that moves files or folders to the trash instead of permanently deleting them. It provides a safer way to delete files and recover them if needed.
  - id: homebrew/cask/trex
    tags: [productivity, utility, text-processing]
    info: >-
      Trex is a text extraction tool that makes it easy to extract text from various sources. It's designed to be simple and efficient for quickly grabbing text content from files or other inputs.
  - id: homebrew/cask/xquartz
    tags: [graphics]
    info: >-
      XQuartz is the X Window System implementation for macOS. It enables you to run X11-based applications and provides essential functionality for running many Unix graphical applications on macOS.
  - id: homebrew/cask/hazel
    tags: [macos, automation, productivity, file-management]
    info: >-
      Hazel watches folders you choose and automatically moves, renames, tags, archives, or deletes files based on rules you define, keeping downloads, documents, and other directories tidy without manual work. It can run workflows, upload files, and clean up application support files via App Sweep while also integrating with Shortcuts, Automator, and AppleScript for richer automations.
  - id: homebrew/cask/hiddenbar
    tags: [macos, productivity, utility, window-management]
    info: >-
      Hidden Bar adds a chevron icon to the macOS menu bar so you can hide or reveal menu extras on demand, keeping the top of your screen uncluttered while still letting you access background apps. Drag menu icons into the hidden zone, click the arrow to stash them, and click again to show them exactly when you need them.
  - id: homebrew/cask/onyx
    tags: [macos, system, diagnostics, utility]
    info: >-
      OnyX is a multifunction maintenance utility that verifies system files, cleans caches, rebuilds indexes, and adjusts Finder, Dock, Safari, and other Apple app settings through a graphical interface. It exposes scripts for maintenance, cleaning, and rebuilding databases so you can safely repair, optimize, and customize macOS without diving into Terminal commands.
- id: media
  name: Media & Design
  desc: Tools for graphic design, illustration, diagramming, and 3D modeling.
  packages:
  - id: homebrew/core/excalidraw-converter
    tags: [visualization, graphics, conversion]
    info: >-
      Excalidraw Converter is a command-line tool that converts Excalidraw diagrams to Gliffy format, allowing you to use hand-drawn style diagrams in tools that support Gliffy.
  - id: homebrew/core/ffmpeg
    tags: [conversion]
    info: >-
      FFmpeg is a complete, cross-platform solution to record, convert, and stream audio and video. It includes libavcodec, an audio/video codec library, and libavformat, a multiplexer/demultiplexer library.
  - id: homebrew/core/gource
    tags: [git, visualization, version-control, graphics]
    info: >-
      Gource is a tool for visualizing version control repositories as animated tree structures. It supports Git, Mercurial, Bazaar, and SVN, and helps you understand project history and collaboration visually.
  - id: homebrew/core/graphviz
    tags: [visualization, documentation]
    info: >-
      Graphviz is open-source graph visualization software. It's used to represent structural information as diagrams of abstract graphs and networks, making it useful for visualizing data structures and relationships.
  - id: homebrew/cask/openscad@snapshot
    tags: [design, programming]
    info: >-
      OpenSCAD is a software for creating solid 3D CAD models. This is the snapshot/development version with the latest features and improvements. Unlike most free software for creating 3D models, it focuses on CAD aspects rather than artistic ones, using a descriptive programming language.
  - id: homebrew/cask/orcaslicer
    tags: [graphics, 3d-printing, design]
    info: >-
      Orca Slicer is a G-code generator for 3D printers. It's a fork of Bambu Studio that provides slicing functionality to convert 3D models into printable G-code. It supports various 3D printer models and provides advanced slicing options for optimizing print quality.
  - id: homebrew/cask/visual-paradigm
    tags: [design, visualization]
    info: >-
      Visual Paradigm is a UML CASE Tool supporting UML 2, SysML and Business Process Modeling Notation. It provides software designers with tools for analysis, design, coding, testing, and deployment.
  - id: homebrew/cask/audacity
    tags: [media, audio]
    info: >-
      Audacity is a free, open source, cross-platform audio software for multi-track recording and editing. It supports various audio formats and provides tools for recording, mixing, and editing audio files with a wide range of effects and plugins.
  - id: homebrew/cask/vlc
    tags: [media, video]
    info: >-
      VLC media player is a free and open source cross-platform multimedia player that plays most multimedia files, and various streaming protocols. It's known for its ability to play almost any video or audio format without requiring additional codecs.
  - id: homebrew/core/yt-dlp
    tags: [media, video, command-line]
    info: >-
      yt-dlp is a feature-rich command-line audio and video downloader. It supports many video sites, format selection, playlist handling, metadata extraction, and post-processing workflows.
  - id: homebrew/cask/colorpicker-materialdesign
    tags: [design, macos, utility]
    info: >-
      Material Design Color Picker is a tool for selecting colors based on Google's Material Design guidelines. It integrates with macOS as a color picker extension. License: MIT Formula: https://github.com/Homebrew/homebrew-cask/blob/HEAD/Casks/c/colorpicker-materialdesign.rb
  - id: homebrew/cask/autodesk-fusion
    tags: [graphics, design]
    info: >-
      Autodesk Fusion 360 is an integrated CAD, CAM, CAE, and PCB tool for product design and manufacturing. It offers parametric modeling, CAM toolpath generation, simulation, and collaboration features for mechanical and electronics design workflows.
- id: graphics
  name: Graphics & Image Tools
  desc: Image editors, screenshot and annotation tools, diagram editors, OCR and image utilities.
  packages:
  - id: homebrew/cask/fontforge-app
    tags: [graphics, design, font-tools]
    info: >-
      FontForge is a free, open-source font editor for outline and bitmap fonts. It lets you edit glyph outlines and metrics, generate multiple font formats, and convert between font formats. Note: This version is built for Intel macOS and requires Rosetta 2 on Apple Silicon.
  - id: homebrew/cask/drawio
    tags: [visualization, design, graphics]
    info: >-
      draw.io (diagrams.net) is a desktop diagram and flowchart editor for flowcharts, process diagrams, org charts, UML, ER and network diagrams. (source: https://www.diagrams.net/)
  - id: homebrew/cask/gimp
    tags: [graphics, design]
    info: >-
      GIMP (GNU Image Manipulation Program) is a free and open-source raster graphics editor used for image retouching, free-form drawing, and converting between image formats. (source: https://www.gimp.org/)
  - id: homebrew/cask/inkscape
    tags: [graphics, design]
    info: >-
      Inkscape is a free and open-source vector graphics editor for creating illustrations, diagrams, logos, and complex paintings. (source: https://inkscape.org/)
  - id: homebrew/core/pngpaste
    tags: [command-line, graphics, utility]
    info: >-
      pngpaste is a command-line tool that pastes PNG images from the clipboard into files. Useful for quickly saving clipboard images to disk on macOS. (source: https://github.com/jcsalterego/pngpaste)
  - id: homebrew/core/tesseract
    tags: [graphics, conversion]
    info: >-
      Tesseract is an open-source OCR engine that recognizes text in images and converts it to machine-readable text. (source: https://tesseract-ocr.github.io/)
  - id: homebrew/core/poppler
    tags: [graphics, conversion]
    info: >-
      Poppler is a PDF rendering library derived from the xpdf codebase. It provides utilities to render and convert PDF documents and is used by many applications for PDF processing.
  - id: homebrew/cask/flameshot
    tags: [graphics, screenshot, productivity]
    info: >-
      Flameshot is a screenshot tool with built-in annotation features. Note: this cask is marked deprecated in Homebrew and scheduled to be disabled on 2026-09-01. (source: https://flameshot.org/)
  - id: homebrew/core/imagemagick
    tags: [graphics, conversion, command-line]
    info: >-
      ImageMagick is a suite of command-line tools and libraries to read, write, and manipulate images in a wide range of formats. It supports common operations like resizing, compositing, format conversion, and image transformations useful for scripting and batch image processing.
- id: network
  name: Network Tools
  desc: Utilities for network diagnostics, communication, and connection management.
  packages:
  - id: homebrew/core/darkhttpd
    tags: [http]
    info: >-
      darkhttpd is a small, static web server that's designed to be secure, simple, and fast. It's perfect for quickly serving static content without the complexity of larger web servers.
  - id: homebrew/core/doggo
    tags: [network, command-line, diagnostics]
    info: >-
      doggo is a modern command-line DNS client that provides clean and colorful output for DNS queries. It's designed to be more user-friendly and feature-rich than traditional tools like dig and nslookup.
  - id: homebrew/core/fping
    tags: [network, monitoring, diagnostics]
    info: >-
      fping is a useful network utility that allows you to ping multiple hosts in parallel, making it much faster than traditional ping for checking multiple systems. It's particularly helpful for network administrators and anyone who needs to monitor the availability of multiple servers or devices on a network.
  - id: homebrew/core/ipcalc
    tags: [network, command-line]
    info: >-
      ipcalc is a command-line tool for calculating various network parameters from IP addresses and network masks. It's useful for network planning, subnetting, and understanding IP address ranges.
  - id: homebrew/core/iftop
    tags: [network, monitoring, diagnostics, command-line]
    info: >-
      iftop is a real-time console-based network bandwidth monitoring tool. It shows a list of network connections from/to your system and displays bandwidth usage on an interface. License: GPL-2.0-or-later Option: --HEAD (install HEAD version) Formula: https://github.com/Homebrew/homebrew-core/blob/HEAD/Formula/i/iftop.rb Note: Requires root privileges to run (`sudo iftop`).
  - id: homebrew/core/mtr
    tags: [network, diagnostics, monitoring]
    info: >-
      MTR combines the functionality of 'traceroute' and 'ping' into a single network diagnostic tool. It continuously monitors connections and shows how packets are routing through the network in real-time.
  - id: homebrew/core/nmap
    tags: [network, security, diagnostics, scanning]
    info: >-
      Nmap (Network Mapper) is a free and open source utility for network discovery and security auditing. It can discover hosts and services on a computer network by sending packets and analyzing responses. Nmap is commonly used for network inventory, managing service upgrade schedules, and monitoring host or service uptime.
  - id: homebrew/cask/ngrok
    tags: [proxy]
    info: >-
      ngrok is a reverse proxy tool that creates secure, introspectable tunnels to localhost. It allows you to expose local servers to the internet for testing and sharing without deploying code.
  - id: homebrew/core/socat
    tags: [network]
    info: >-
      socat is a multipurpose relay for bidirectional data transfer. It's like netcat on steroids, establishing two bidirectional byte streams and transferring data between them, with many advanced features.
  - id: homebrew/core/sshpass
    tags: [ssh, security, password-manager, automation]
    info: >-
      sshpass is a tool for non-interactive SSH password authentication. It allows you to provide the password for SSH connections on the command line, which is useful for scripts but should be used with caution for security reasons.
  - id: homebrew/core/sshuttle
    tags: [network, ssh, proxy]
    info: >-
      sshuttle is a transparent proxy server that works as a poor person's VPN. It forwards connections through an SSH server, without requiring admin access, special client software, or server-side configuration.
  - id: homebrew/cask/tailscale-app
    tags: [network, security, macos]
    info: >-
      Tailscale provides a secure mesh VPN built on WireGuard that connects your devices with minimal configuration. The macOS app includes a native GUI for device and access management and leverages platform networking features; it may require enabling a kernel extension or system permission during setup. Typical uses include secure remote access, private networking between devices, and exposing services safely across an individual's machines.
  - id: homebrew/core/wget
    tags: [http]
    info: >-
      wget is a free utility for non-interactive download of files from the web. It supports HTTP, HTTPS, and FTP protocols, as well as retrieval through HTTP proxies, making it a versatile tool for downloading files from the command line. It can work in the background and recover from broken downloads, making it ideal for unstable connections.
  - id: homebrew/cask/wireshark-app
    tags: [network, diagnostics]
    info: >-
      Wireshark is a network protocol analyzer that lets you capture and interactively browse the traffic on your computer network. It provides detailed information about network protocols and is widely used for network troubleshooting, analysis, and development.
- id: notes
  name: Notes & Knowledge Management
  desc: Tools for note-taking, knowledge management, and document organization.
  packages:
  - id: homebrew/cask/craft
    tags: [knowledge-management, productivity, editor]
    info: >-
      Craft is a beautiful, native document editor for Mac and iOS that combines the best of document editing and note-taking. It features a block-based editor with excellent organization tools.
  - id: homebrew/cask/obsidian
    tags: [knowledge-management]
    info: >-
      Obsidian is a powerful knowledge base that works on top of a local folder of plain text Markdown files. It allows you to create a personal knowledge graph with bidirectional linking between notes.
- id: office
  name: Office
  desc: Office suites applications for document creation and editing.
  packages:
  - id: homebrew/cask/adobe-acrobat-reader
    tags: [productivity, pdf, office]
    info: >-
      Adobe Acrobat Reader is a free PDF viewer and editor. It allows you to view, print, comment on, and share PDF documents. It's the most widely used PDF reader and provides essential tools for working with PDF files across different platforms.
  - id: homebrew/cask/teamviewer
    tags: [remote-access, productivity, security]
    info: >-
      TeamViewer is remote access and connectivity software that enables secure remote desktop access, file transfer, and collaboration capabilities. It's widely used by IT professionals and support teams for remote assistance and device management.
  - id: homebrew/cask/libreoffice
    tags: [productivity, editor]
    info: >-
      LibreOffice is a powerful and free office suite that includes applications for word processing, spreadsheets, presentations, diagrams, and databases. It's fully compatible with Microsoft Office formats while supporting open standards.
- id: security
  name: Security & Encryption
  desc: Tools for password management, encryption, and security-related operations.
  packages:
  - id: homebrew/core/gnupg
    tags: [security, encryption]
    info: >-
      GnuPG (GPG) is a complete implementation of the OpenPGP standard for encrypting and signing data and communications. It's widely used for secure email communication and file encryption.
  - id: homebrew/core/gnutls
    tags: [security, encryption]
    info: >-
      GnuTLS is a secure communications library implementing the SSL, TLS and DTLS protocols. It provides an API to access secure communication protocols that helps you implement security in your applications.
  - id: homebrew/core/gpg-tui
    tags: [security, encryption]
    info: >-
      gpg-tui is a Terminal User Interface for GnuPG. It provides a visual way to manage your GPG keys, making key management more intuitive and accessible from the terminal.
  - id: homebrew/cask/keepassxc
    tags: [security, password-manager, encryption, credentials]
    info: >-
      KeePassXC is a cross-platform password manager that allows you to store your passwords in an encrypted database. It includes features like auto-type, browser integration, and TOTP support.
  - id: homebrew/core/mkcert
    tags: [security, development]
    info: >-
      mkcert is a zero-config tool that makes locally-trusted development certificates. It automatically creates and installs a local CA in the system root store, and generates locally-trusted certificates for local development and testing.
  - id: homebrew/core/pass
    tags: [security, password-manager, encryption]
    info: >-
      pass (the standard Unix password manager) is a simple password manager that follows the Unix philosophy. It stores passwords in GPG-encrypted files, which can be managed with standard Unix commands.
  - id: homebrew/core/pwgen
    tags: [security, password-manager, automation, command-line]
    info: >-
      pwgen is a small, GPL-licensed password generator which creates passwords which can be easily memorized by a human, while being as secure as possible.
  - id: homebrew/core/qrencode
    tags: [command-line, automation]
    info: >-
      qrencode is a fast and compact library for encoding data in a QR Code symbol, a 2D barcode. It's useful for sharing Wi-Fi passwords, URLs, or other data that can be scanned by smartphones.
  - id: homebrew/core/qrtool
    tags: [command-line, automation]
    info: >-
      qrtool is a command-line utility for encoding and decoding QR codes. It is useful for creating QR codes from text or extracting data from QR code images during automation and testing.
  - id: homebrew/core/showcert
    tags: [security]
    info: >-
      showcert is a tool for reading and creating X.509 TLS certificates. It provides a simple interface for inspecting certificate information and generating certificates for testing and development purposes.
  - id: homebrew/core/sops
    tags: [security, encryption]
    info: >-
      SOPS (Secrets OPerationS) is an editor of encrypted files that supports YAML, JSON, ENV, INI and BINARY formats. It encrypts with AWS KMS, GCP KMS, Azure Key Vault, age, and PGP, making it ideal for managing sensitive configuration files.
  - id: homebrew/core/testssl
    tags: [security, testing]
    info: >-
      testssl.sh is a command line tool that checks a server's service on any port for the support of TLS/SSL ciphers, protocols and cryptographic flaws. It helps identify security vulnerabilities in SSL/TLS configurations.
  - id: homebrew/core/trivy
    tags: [security, container]
    info: >-
      Trivy is a comprehensive security scanner for vulnerabilities in container images, file systems, and Git repositories. It detects vulnerabilities in OS packages and application dependencies, helping to secure your software supply chain.
  - id: homebrew/core/trufflehog
    tags: [security, git]
    info: >-
      Trufflehog is a tool for finding and verifying credentials in Git repositories, filesystems, and other sources. It scans for secrets like API keys, passwords, and tokens that may have been accidentally committed, helping to prevent credential leaks and security breaches.
  - id: homebrew/core/age
    tags: [security, encryption, file-management]
    info: >-
      Age is a simple, modern, and secure file encryption tool. It is designed to be easy to use and secure by default, with small and auditable code. License: BSD-3-Clause Build dependencies: go Option: --HEAD (install HEAD version) Formula: https://github.com/Homebrew/homebrew-core/blob/HEAD/Formula/a/age.rb
- id: system
  name: System Monitoring & Management
  desc: Tools for monitoring and managing system components and hardware.
  packages:
  - id: homebrew/core/bpytop
    tags: [system, monitoring, performance, process-manager]
    info: >-
      bpytop is a resource monitor that shows usage and stats for processor, memory, disks, network, and processes. It features a customizable interface with mouse support and fast response.
  - id: homebrew/core/btop
    tags: [system, monitoring, performance, process-manager]
    info: >-
      btop is a resource monitor that displays usage and stats for processor, memory, disks, network, and processes. It's the C++ version and continuation of bpytop, offering better performance and more features.
  - id: homebrew/core/fastfetch
    tags: [system]
    info: >-
      fastfetch is a system information tool similar to neofetch but written primarily in C for superior performance. It displays system specs, OS information, and hardware details in a visually appealing way and loads significantly faster. It supports extensive customization and various output formats.
  - id: homebrew/core/htop
    tags: [system, monitoring, performance, process-manager]
    info: >-
      htop is an interactive process viewer for Unix systems. It's a more user-friendly alternative to top, with the ability to scroll vertically and horizontally, and kill processes without entering their PIDs.
  - id: homebrew/core/lsusb
    tags: [hardware, system, diagnostics]
    info: >-
      lsusb is a utility for displaying information about USB buses in the system and the devices connected to them. This is a macOS port of the Linux command with similar functionality.
  - id: homebrew/core/smartmontools
    tags: [hardware, storage, monitoring, diagnostics]
    info: >-
      smartmontools contains utilities to control and monitor storage systems using the Self-Monitoring, Analysis, and Reporting Technology (SMART) built into most modern hard drives and SSDs.
  - id: homebrew/cask/stats
    tags: [system, monitoring, performance]
    info: >-
      Stats is a macOS system monitor that lives in your menu bar. It provides real-time information about your CPU, GPU, memory, network usage, and other system metrics in a clean and configurable interface.
  - id: homebrew/core/asitop
    tags: [system, monitoring, performance, process-manager]
    info: >-
      asitop is a performance monitoring CLI tool for Apple Silicon Macs. It provides real-time CPU, GPU, and memory usage statistics, helping you monitor and analyze system performance. License: MIT Requires: arm64 architecture, macOS Formula: https://github.com/Homebrew/homebrew-core/blob/HEAD/Formula/a/asitop.rb
  - id: homebrew/core/nvtop
    tags: [system, monitoring, performance]
    info: >-
      nvtop is an interactive GPU process monitor. It displays real-time GPU usage, processes, and performance metrics for supported GPUs. License: GPL-3.0-or-later Build dependency: cmake Formula: https://github.com/Homebrew/homebrew-core/blob/HEAD/Formula/n/nvtop.rb
  - id: homebrew/core/procs
    tags: [system, monitoring, performance, process-manager, command-line, rust]
    info: >-
      procs is a modern replacement for the ps command written in Rust. It provides colored output, additional information about processes, and improved usability with modern terminal features.
- id: task
  name: Task & Time Management
  desc: Tools for managing tasks, time tracking, and implementing productivity techniques.
  packages:
  - id: homebrew/core/task
    tags: [productivity, task-management, command-line]
    info: >-
      Taskwarrior is a command-line task management tool with a powerful and flexible system for organizing and tracking your tasks. It supports tags, priorities, due dates, dependencies, and more.
  - id: homebrew/cask/taskwarrior-pomodoro
    tags: [productivity, task-management, time-tracking]
    info: >-
      Taskwarrior Pomodoro integrates the Pomodoro Technique with Taskwarrior, allowing you to track your time using the Pomodoro method while managing tasks with Taskwarrior.
  - id: homebrew/core/taskwarrior-tui
    tags: [productivity, task-management, command-line]
    info: >-
      Taskwarrior TUI provides a terminal user interface for Taskwarrior, making it easier to view, filter, and manage your tasks with a more visual interface while still in the terminal.
  - id: homebrew/core/timewarrior
    tags: [productivity, time-tracking, command-line, task-management]
    info: >-
      Timewarrior is a command-line time tracking application that integrates with Taskwarrior. It helps you track time spent on activities and generates reports on how you spend your time.
- id: term
  name: Terminal Emulators & Shell Tools
  desc: Modern terminal emulators, multiplexers, and shell enhancements to improve productivity and user experience in the command line.
  packages:
  - id: homebrew/core/nushell
    tags: [terminal, shell, command-line, rust]
    info: >-
      Nushell is a modern shell designed for the GitHub era. It works with structured data like JSON, YAML,  and CSV natively, treats all output as structured data, and offers rich error messages and  excellent cross-platform support. It's written in Rust for performance and reliability.
  - id: homebrew/core/byobu
    tags: [terminal]
    info: >-
      Byobu is an enhancement for the terminal that provides a status bar, tabbed windows, keybindings, and session management. It's built on top of screen or tmux for improved usability.
  - id: homebrew/core/bundler-completion
    tags: [terminal, shell, command-line]
    info: >-
      bundler-completion provides shell completion definitions for Bundler commands. It improves terminal ergonomics by completing Bundler subcommands, options, and related Ruby project workflows.
  - id: homebrew/core/fish
    tags: [terminal, shell, command-line]
    info: >-
      Fish is a smart and user-friendly command-line shell for Unix-like systems. It features syntax highlighting, autosuggestions, robust tab completion, and web-based configuration, making it more accessible than traditional shells while maintaining compatibility.
  - id: homebrew/core/bash
    tags: [terminal, shell, command-line, system]
    info: >-
      The GNU Bourne-Again SHell (bash) is a POSIX-compatible shell with many interactive features and scripting extensions used for system administration and scripting. Build-time deps: ncurses, readline, gettext.
  - id: homebrew/core/fisher
    tags: [shell, command-line]
    info: >-
      Fisher is a plugin manager for the Fish shell. It simplifies installing, updating and managing packages for Fish.
  - id: homebrew/core/gettext
    tags: [command-line]
    info: >-
      gettext is a GNU library for internationalization and localization. It provides tools and libraries for translating programs into multiple languages and handling different character encodings.
  - id: homebrew/cask/kitty
    tags: [terminal]
    info: >-
      Kitty is a fast, feature-rich, GPU-based terminal emulator. It supports ligatures, graphics, and has a framework for extensions. It's designed to be lightweight yet powerful.
  - id: homebrew/core/mcfly
    tags: [terminal, shell, command-line, productivity]
    info: >-
      McFly is a replacement for your shell history search. It uses context to prioritize results and provides a more intuitive interface for navigating your command history. License: MIT Build dependencies: rust Option: --HEAD (install HEAD version) Formula: https://github.com/Homebrew/homebrew-core/blob/HEAD/Formula/m/mcfly.rb
  - id: homebrew/core/putty
    tags: [ssh, terminal]
    info: >-
      PuTTY is a free and open-source terminal emulator, serial console, and network file transfer application. It supports several network protocols, including SSH, Telnet, rlogin, and raw socket connections.
  - id: homebrew/core/rlwrap
    tags: [command-line]
    info: >-
      rlwrap is a 'readline wrapper' that adds readline capabilities to command-line programs that don't have them. It provides command history, line editing, and completion to any command.
  - id: homebrew/core/starship
    tags: [terminal, shell, command-line, rust]
    info: >-
      Starship is a minimal, blazing-fast, and infinitely customizable prompt for any shell. It provides information you need while staying sleek and minimal, with support for git status, languages, and system information.
  - id: homebrew/core/tmux
    tags: [terminal, productivity]
    info: >-
      tmux is a terminal multiplexer that allows you to run multiple terminal sessions within a single window. It enables session persistence, window splitting, and session sharing between users.
  - id: homebrew/cask/warp
    tags: [terminal, rust]
    info: >-
      Warp is a modern, Rust-based terminal application designed to improve the terminal experience for developers. It features AI-powered auto-completion, block-based navigation, and collaborative sessions, making it powerful and lightweight yet powerful.
  - id: homebrew/core/zellij
    tags: [terminal, productivity, rust]
    info: >-
      Zellij is a terminal workspace with a terminal multiplexer as its base feature. It's designed to be a modern replacement for tmux with additional features like plugin support, tabs, and a more intuitive interface.
  - id: homebrew/core/zoxide
    tags: [terminal, command-line, file-management, rust]
    info: >-
      Zoxide is a smarter cd command that remembers which directories you use most frequently. It learns your habits and provides shortcuts to quickly navigate to frequently used directories.
  - id: homebrew/core/powershell
    tags: [terminal, shell, command-line, automation]
    info: >-
      PowerShell is a cross-platform command-line shell and scripting language built on .NET. It provides powerful object-oriented features and extensive cmdlets for system administration and automation tasks across Windows, macOS, and Linux.
- id: text
  name: Text Processing & Publishing
  desc: Tools for processing and converting text, generating documentation, and publishing.
  packages:
  - id: homebrew/core/asciidoctor
    tags: [documentation, markup, publishing, text-processing]
    info: >-
      Asciidoctor is a fast text processor and publishing toolchain for converting AsciiDoc content to HTML5, DocBook, PDF, and other formats. It's written in Ruby and runs on all major operating systems.
  - id: homebrew/core/bat
    tags: [command-line]
    info: >-
      bat is a cat clone with syntax highlighting, Git integration, and automatic paging. It provides a more visually appealing way to view file contents in the terminal.
  - id: homebrew/core/doxygen
    tags: [documentation, publishing, code, generator]
    info: >-
      Doxygen is a documentation generator for a wide range of programming languages. It extracts documentation from source code comments and produces HTML, LaTeX, man pages, and more. Useful for generating API documentation for C, C++, Java, Python, and other languages. License: GPL-2.0-only Build dependencies: bison, cmake Option: --HEAD (install HEAD version) Formula: https://github.com/Homebrew/homebrew-core/blob/HEAD/Formula/d/doxygen.rb
  - id: homebrew/core/markdownlint-cli
    tags: [markdown, testing, documentation]
    info: >-
      markdownlint-cli is a command-line tool for checking Markdown files and enforcing style rules. It helps maintain consistent Markdown formatting in documentation and codebases.
  - id: homebrew/core/mdformat
    tags: [markdown, text-processing, documentation]
    info: >-
      mdformat is a CommonMark compliant Markdown formatter that helps maintain consistent formatting in Markdown files. It focuses on ensuring compliance with the CommonMark standard while providing configurable formatting options.
  - id: homebrew/core/pandoc
    tags: [markup, publishing, text-processing]
    info: >-
      Pandoc is a universal document converter that can convert files from one markup format to another. It supports dozens of formats including Markdown, HTML, LaTeX, PDF, EPUB, and Microsoft Word.
  - id: homebrew/core/prettier
    tags: [testing, javascript, markdown]
    info: >-
      Prettier is an opinionated code formatter that supports many languages and formats, including JavaScript, CSS, JSON, Markdown, and YAML. It enforces a consistent style by parsing your code and re-printing it with its own rules.
  - id: homebrew/core/typst
    tags: [markup, publishing]
    info: >-
      Typst is a markup-based typesetting system that allows you to create beautifully formatted documents with a simple syntax. It's designed to be easy to use while producing professional-looking output.
  - id: homebrew/core/typstyle
    tags: [markup, text-processing]
    info: >-
      typstyle is a beautiful and reliable formatter for Typst code. It helps maintain consistent formatting in Typst documents and ensures clean, readable markup for collaborative document creation.
  - id: homebrew/core/glow
    tags: [markdown, text-processing, command-line]
    info: >-
      Glow is a terminal-based Markdown reader that renders Markdown files beautifully in the command line. It supports syntax highlighting, paging, and can discover and display Markdown files in directories.
  - id: homebrew/core/xmlstarlet
    tags: [text-processing, command-line]
    info: >-
      XMLStarlet is a set of command-line utilities for transforming, querying, validating, and editing XML documents. It provides a comprehensive toolkit for working with XML files from the command line.
- id: vcs
  name: Version Control Systems
  desc: Various version control systems beyond Git and tools for different VCS platforms.
  packages:
  - id: homebrew/core/darcs
    tags: [version-control, distributed]
    info: >-
      Darcs is a distributed version control system written in Haskell. It has a unique approach to version control with its 'theory of patches', focusing on changes rather than snapshots.
  - id: homebrew/core/fossil
    tags: [version-control, distributed]
    info: >-
      Fossil is a distributed version control system, bug tracking system and wiki software server in a single integrated package. It's designed to be simpler than Git while still powerful.
- id: vm
  name: Virtual Machines
  desc: Tools for managing, emulating, and running virtual machines.
  packages:
  - id: homebrew/core/govc
    tags: [virtualization, management]
    info: >-
      govc is a command-line tool for interacting with VMware vSphere APIs. It provides a simple and powerful way to manage virtual machines, datastores, networks, and other vSphere resources.
  - id: homebrew/core/lima
    tags: [virtualization, container, macos]
    info: >-
      Lima launches Linux virtual machines with automatic file sharing and port forwarding. It's designed to be a lightweight alternative to Docker Desktop for running Linux containers on macOS.
  - id: homebrew/cask/multipass
    tags: [virtualization, development]
    info: >-
      Multipass is a lightweight VM manager for Linux, Windows, and macOS. It lets you quickly spin up Ubuntu VMs with a single command, making it easy to create development environments.
  - id: homebrew/core/qemu
    tags: [virtualization, system]
    info: >-
      QEMU is a generic and open source machine emulator and virtualizer. It can run operating systems and programs made for one machine on a different machine, and is used by many virtualization tools.
  - id: homebrew/cask/utm
    tags: [virtualization, macos]
    info: >-
      UTM is a full-featured virtual machine host for macOS. It's built on QEMU and allows you to run Windows, Linux, and other operating systems on your Mac with a native macOS interface.
- id: uncategorized
  name: Uncategorized Packages
  desc: Packages that are installed on your System but not categorized, yet. This section is reserved for uncategorized packages. Please assign packages to existing categories or create new ones as appropriate.
  packages: []
- id: pentest
  name: Penetration Testing & Security Tools
  desc: Tools for security testing, vulnerability assessment, and penetration testing.
  packages:
  - id: homebrew/core/ffuf
    tags: [security, testing, http]
    info: >-
      FFUF (Fuzz Faster U Fool) is a fast web fuzzer written in Go. It's designed for discovering  content and endpoints through web fuzzing, with support for HTTP, HTTPS, and various fuzzing  techniques. It's commonly used in penetration testing and security research.
  - id: homebrew/core/gobuster
    tags: [security, testing, network]
    info: >-
      Gobuster is a tool used to brute-force URIs (directories and files) in web sites, DNS subdomains,  virtual host names, and Amazon S3 buckets. It's written in Go for speed and efficiency in  penetration testing and security assessments.
- id: entertainment
  name: Entertainment & Fun
  desc: Fun terminal applications and entertainment tools.
  packages:
  - id: homebrew/core/cmatrix
    tags: [terminal, entertainment]
    info: >-
      CMatrix is a curses-based program that simulates the digital rain from the movie "The Matrix".  It displays scrolling lines of random characters in a terminal, creating the iconic green  "digital rain" effect. It's a fun terminal screensaver and demonstration program.
  - id: homebrew/core/sl
    tags: [terminal, entertainment, command-line]
    info: >-
      SL (Steam Locomotive) is a humorous command that displays an ASCII art steam locomotive  animation when you accidentally type "sl" instead of "ls". It's a classic Unix joke program  that teaches you to type commands correctly. Note: This package conflicts with sapling.
- id: remote
  name: Remote Access & Control
  desc: Tools for remote desktop access and virtual private networks.
  packages:
  - id: homebrew/cask/rustdesk
    tags: [remote, utility]
    info: >-
      RustDesk is an open-source remote desktop application written in Rust. It provides secure remote access with features like file transfer, screen sharing, and cross-platform compatibility, offering an alternative to proprietary remote desktop solutions.
  - id: homebrew/core/mosh
    tags: [remote, terminal, ssh, network]
    info: >-
      Mosh is a remote terminal application that allows roaming, supports intermittent connectivity, and provides intelligent local echo and line editing of user keystrokes. It's a more robust alternative to SSH for mobile users. License: GPL-3.0-or-later Build dependencies: pkgconf, tmux Required dependencies: protobuf Option: --HEAD (install HEAD version) Formula: https://github.com/Homebrew/homebrew-core/blob/HEAD/Formula/m/mosh.rb
  - id: homebrew/cask/windows-app
    tags: [remote, utility]
    info: >-
      Windows App is Microsoft's official application for connecting to Windows systems remotely. It provides a unified experience for accessing Windows PCs, Azure Virtual Desktop, Windows 365, and other Windows-based cloud services with secure authentication and modern connectivity features.
