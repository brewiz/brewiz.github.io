---
# This part is only for documentation purposes and is ignored
Title: Brewiz Package List
Description: >
    This file is part of Brewiz, the UI for Homebrew.
    It contains a list of packages and their metadata for Brewiz.
    Each package has an ID, name, description, homepage, and other metadata.
    The file is structured as a YAML document with a list of categories, each containing a list of packages.
    Each package has a unique ID, name, description, and other metadata.
    The file is used to generate the Brewiz UI.
Disclaimers:
  - This file is not part of the official Homebrew project.
  - This file is not maintained by the Homebrew team.
  - This file is not an official Homebrew package list.
  - This file is not guaranteed to be up-to-date or accurate.
  - This file is provided as-is, without any warranties or guarantees.
  - Use this file at your own risk.
Copyright: Copyright (c) 2025 Werner Stein
License: MIT
LicenseFile: LICENSE
# Replace the `$ brew info...` block with your Homebrew info
UpdatePrompt: |
  You are a Homebrew package maintainer. Your task is to update the Brewiz package list with the provided Homebrew info.
  You will be given a list of packages and their metadata, including the package name, description, homepage, and other metadata.
  Your task is to update the Brewiz package list with the provided Homebrew info.

  Update the Brewiz package list as follows:
    1. Add the following package to the most appropriate existing category, using the provided Homebrew info
    2. Ensure the package is placed in the best-fitting existing category (e.g., "Text Processing & Publishing" or "Development Utilities").
    3. Use the style and metadata format consistent with the rest of the file.
    4. Prefer assigning to existing categories; avoid creating new categories unless absolutely necessary.
    5. Assign tags by preferring already existing tags from the file; avoid creating new tags unless absolutely necessary.
    6. Do not duplicate packages if they already exist.

  The Homebrew info for the package list is as follows:

  ───────x───────x───────x───────x───────x───────x───────x───────x───────x───────

  $ brew info --formula doxygen
  doxygen: stable 1.13.2 (bottled), HEAD
  Generate documentation for several programming languages
  https://www.doxygen.nl/
  Not installed
  From: https://github.com/Homebrew/homebrew-core/blob/HEAD/Formula/d/doxygen.rb
  License: GPL-2.0-only
  Dependencies:
    Build: bison, cmake
  Options:
    --HEAD: Install HEAD version
  Analytics:
    install: 6,020 (30 days), 20,827 (90 days), 109,527 (365 days)
    install-on-request: 2,005 (30 days), 7,563 (90 days), 40,582 (365 days)
    build-error: 270 (30 days)

---
- id: ai
  name: AI & Machine Learning
  desc: Tools for artificial intelligence, machine learning, and large language models.
  packages:
  - id: homebrew/cask/claude-code
    tags: [ai, command-line, development]
    info: >-
      Claude Code is Anthropic's terminal-based AI coding assistant. It helps developers inspect code, edit files, run commands, and automate development workflows from the command line.
  - id: homebrew/cask/codex
    tags: [ai, command-line, development]
    info: >-
      Codex is OpenAI's terminal-based coding agent. It can help explore codebases, make edits, run checks, and support software development workflows directly from the command line.
  - id: homebrew/core/llm
    tags: [ai, command-line]
    info: >-
      LLM is a command-line tool for interacting with large language models. It provides a simple interface to query various language models, manage conversations, and work with prompts from the terminal.
  - id: homebrew/core/ollama
    tags: [ai]
    info: >-
      Ollama is a tool for running and managing large language models locally. It allows you to easily run, create, and customize AI models on your own hardware, with support for various open-source models.
  - id: homebrew/core/opencode
    tags: [ai, command-line, development]
    info: >-
      opencode is a terminal-first AI coding agent for working with codebases. It provides an interactive command-line workflow for AI-assisted code exploration, editing, and development automation.
  - id: homebrew/core/tgpt
    tags: [ai, command-line]
    info: >-
      tgpt is a command-line interface for AI chatbots that doesn't require API keys. It provides access to various AI models directly from the terminal, making it easy to get AI assistance without complex setup.
  - id: homebrew/core/gemini-cli
    tags: [ai, command-line]
    info: >-
      Gemini CLI is an open-source command-line interface for Google's Gemini family of AI models. It provides terminal-first access to chat and multimodal capabilities, built-in tools for grounding (web search, file operations), and integrations for automation and MCP servers. Authentication options include Google OAuth, API key, and Vertex AI for enterprise workflows.
- id: archive
  name: Archiving & Compression
  desc: Tools for compressing, archiving, and extracting files.
  packages:
  - id: homebrew/core/p7zip
    tags: [archive, compression, file-management]
    info: >-
      p7zip is a port of 7-Zip for POSIX systems, providing high compression ratio in 7z format and supporting various other archive formats.
  - id: homebrew/cask/rar
    tags: [archive, compression]
    info: >-
      RAR is a proprietary archive file format that supports data compression, error recovery, and file spanning. This package provides tools to create and extract RAR archives.
  - id: homebrew/core/sevenzip
    tags: [archive, compression, file-management]
    info: >-
      7-Zip is a file archiver with a high compression ratio, supporting multiple archive formats including its own 7z format with LZMA and LZMA2 compression.
- id: web
  name: Browsers & Web Tools
  desc: Web browsers and tools for API development and web-related tasks.
  packages:
  - id: homebrew/core/kotlin
    tags: [programming-language, java, development]
    info: >-
      Kotlin is a modern, statically typed programming language that targets the JVM and also supports compilation to JavaScript and native binaries. It is interoperable with Java and widely used for Android and server-side development.
  - id: homebrew/cask/brave-browser
    tags: [web, security]
    info: >-
      Brave is a privacy-focused web browser that blocks ads and trackers, loads pages faster, and protects your privacy by default. It's built on Chromium and includes features like Tor integration and a built-in ad blocker.
  - id: homebrew/cask/breitbandmessung
    tags: [network, diagnostics]
    info: >-
      Breitbandmessung is the official internet speed test tool from the German Bundesnetzagentur. It allows you to test your internet connection speed and quality to ensure you're getting the service you're paying for.
  - id: homebrew/cask/bruno
    tags: [api, http, development, testing]
    info: >-
      Bruno is an open source IDE for exploring and testing APIs. It provides a clean interface for sending HTTP requests, managing collections, and sharing API documentation with your team.
  - id: homebrew/cask/hoppscotch
    tags: [api, http, development, testing]
    info: >-
      Hoppscotch is an open-source API development ecosystem. It provides a lightweight, web-based API client that helps you create and test API requests quickly and efficiently.
  - id: homebrew/cask/librewolf
    tags: [web, security]
    info: >-
      LibreWolf is a privacy-focused web browser based on Firefox. It comes with enhanced privacy settings by default, removes telemetry, and includes built-in content blocking to protect user privacy without sacrificing usability.
  - id: homebrew/cask/orion
    tags: [web, security, macos]
    info: >-
      Orion is a WebKit-based browser designed for macOS. It aims to be a fast, privacy-focused alternative to Safari with support for Chrome and Firefox extensions.
  - id: homebrew/cask/postman
    tags: [api, http, development, testing]
    info: >-
      Postman is a popular API development environment that allows you to design, test, and document APIs. It provides a user-friendly interface for making HTTP requests and inspecting responses.
  - id: homebrew/cask/katalon-studio
    tags: [testing, automation, development]
    info: >-
      Katalon Studio is a comprehensive test automation solution for web, API, mobile, and desktop applications. It provides a complete testing framework with built-in keywords, test case management, and reporting capabilities for both manual and automated testing.
  - id: homebrew/core/xh
    tags: [http, command-line, api, testing]
    info: >-
      xh is a friendly and fast tool for sending HTTP requests. It reimplements as much as possible  of HTTPie's excellent design, with a focus on improved performance and a more streamlined  interface. It's written in Rust for speed and safety.
  - id: homebrew/cask/zen
    tags: [web, macos]
    info: >-
      Zen Browser is a Gecko-based web browser with a focus on privacy and usability. It offers a streamlined browsing experience and is distributed as a macOS desktop app.
- id: cloud
  name: Cloud & DevOps
  desc: Tools for cloud infrastructure, deployment automation, and DevOps workflows.
  packages:
  - id: homebrew/core/act
    tags: [cloud, automation, testing]
    info: >-
      act runs GitHub Actions workflows locally by reading workflow files and executing jobs in containers. It is useful for testing CI changes before pushing them to GitHub.
  - id: homebrew/core/ansible
    tags: [cloud, automation, deployment]
    info: >-
      Ansible is an open source automation platform that automates cloud provisioning, configuration management, application deployment, intra-service orchestration, and other IT needs. It uses a simple, human-readable language called YAML to define automation tasks.
  - id: homebrew/core/ansible-lint
    tags: [cloud, automation, testing]
    info: >-
      Ansible-lint is a command-line tool for linting Ansible playbooks. It helps identify and fix issues in Ansible code by checking against best practices and common mistakes.
  - id: homebrew/core/awscli
    tags: [cloud, command-line, automation]
    info: >-
      The AWS Command Line Interface (CLI) is a unified tool to manage your AWS services. With just one tool to download and configure, you can control multiple AWS services from the command line and automate them through scripts.
  - id: homebrew/core/azure-cli
    tags: [cloud, command-line]
    info: >-
      The Azure Command Line Interface (CLI) is a set of commands used to manage Azure resources from the command line or in scripts. It provides a consistent interface for interacting with Azure services.
- id: analyze
  name: Code Analysis
  desc: Tools for static code analysis, linting, and code quality assessment.
  packages:
  - id: crystal-ameba/ameba/ameba
    tags: [code-analysis, testing]
    info: >-
      Ameba is a static code analysis tool for Crystal, helping you write cleaner and more maintainable code by enforcing style guidelines and detecting potential issues.
  - id: homebrew/core/biome
    tags: [code-analysis, testing, javascript]
    info: >-
      Biome is a fast web development toolchain that combines formatting, linting, and code quality checks for JavaScript, TypeScript, JSON, CSS, and related frontend project files.
  - id: homebrew/core/isort
    tags: [code-analysis, python, testing]
    info: >-
      isort is a Python utility that sorts imports alphabetically and automatically separates them into sections. It helps maintain consistent import formatting across Python projects and improves code readability.
  - id: homebrew/core/oxfmt
    tags: [code-analysis, testing, javascript]
    info: >-
      oxfmt is a high-performance code formatter from the Oxc toolchain. It focuses on fast, consistent formatting for JavaScript and TypeScript projects.
  - id: homebrew/core/scc
    tags: [code-analysis]
    info: >-
      SCC (Sloc, Cloc and Code) is a very fast and accurate code counter with complexity calculations and COCOMO estimates written in Go. It's useful for analyzing codebases and estimating project complexity.
  - id: homebrew/core/semgrep
    tags: [code-analysis, testing, security]
    info: >-
      Semgrep is a static analysis tool for finding bugs, security issues, and code anti-patterns across many programming languages. It supports custom rules and CI-friendly scanning workflows.
  - id: homebrew/core/shellcheck
    tags: [code-analysis, testing]
    info: >-
      ShellCheck is a shell script static analysis tool that gives warnings and suggestions for bash/sh shell scripts. It helps identify and fix common shell script issues and follows best practices.
  - id: homebrew/core/yamllint
    tags: [code-analysis, testing]
    info: >-
      yamllint is a linter for YAML files that helps identify and fix issues in YAML syntax and formatting. It checks for syntax errors, key repetition, indentation problems, and other common YAML issues, making it useful for maintaining clean configuration files.
- id: snip
  name: Command Snippets & Documentation
  desc: Tools for managing command snippets, recording terminal sessions, and learning.
  packages:
  - id: homebrew/core/agg
    tags: [terminal, recording, documentation]
    info: >-
      agg is a tool that converts asciinema recordings (terminal session recordings) to animated GIFs. It's useful for creating visual documentation of command-line workflows.
  - id: homebrew/core/asciinema
    tags: [terminal, recording, documentation]
    info: >-
      asciinema is a lightweight, terminal session recorder that lets you record your command-line sessions and share them easily with others. The recordings can be played back in a terminal or web browser.
  - id: homebrew/core/exercism
    tags: [programming]
    info: >-
      Exercism is a platform for learning programming languages through practice and mentorship. The CLI tool allows you to download exercises and submit solutions directly from your terminal.
  - id: knqyf263/pet/pet
    tags: [command-line, productivity, management]
    info: >-
      pet is a simple command-line snippet manager written in Go. It allows you to save and retrieve frequently used commands, making it easier to remember complex commands.
  - id: homebrew/cask/replit
    tags: [ide, cloud, development]
    info: >-
      replit is a command-line tool for interacting with Replit, an online IDE and coding platform. It allows you to manage your Replit projects, collaborate with others, and run code directly from the terminal.
  - id: homebrew/core/tldr
    tags: [command-line, documentation, programming]
    info: >-
      tldr provides simplified and community-driven man pages with practical examples. It gives concise help for common command-line tools, making it easier to learn and remember command usage.
- id: container
  name: Containers & Virtualization
  desc: Container management tools, Docker utilities, and container runtime environments.
  packages:
  - id: homebrew/core/colima
    tags: [container, macos, virtualization]
    info: >-
      Colima provides container runtimes on macOS with minimal setup. It creates a Lima VM with containerd and optionally Docker, Kubernetes available inside. A lightweight alternative to Docker Desktop.
  - id: homebrew/cask/devpod
    tags: [container, development]
    info: >-
      DevPod is an open-source tool to create reproducible developer environments based on devcontainer.json. It allows you to develop consistently across different machines and environments.
  - id: homebrew/core/dive
    tags: [container, optimization]
    info: >-
      Dive is a tool for exploring a Docker image, layer contents, and discovering ways to shrink the size of your Docker/OCI image. It helps optimize container images by analyzing what's in each layer.
  - id: homebrew/core/container
    tags: [container, macos, virtualization]
    info: >-
      container is a tool to create and run Linux containers using lightweight virtual machines. It provides an easy way to run container workloads using macOS-native tooling and installers.
  - id: homebrew/core/docker
    tags: [container, development, virtualization]
    info: >-
      Docker is a platform for developing, shipping, and running applications in containers. It enables you to separate your applications from your infrastructure to deliver software quickly.
  - id: homebrew/core/docker-completion
    tags: [container, productivity]
    info: >-
      This package provides command-line completion for Docker in Bash, Zsh, and Fish shells, making it easier to use Docker commands by providing tab completion for commands and options.
  - id: homebrew/core/lazydocker
    tags: [container, management]
    info: >-
      Lazydocker is a terminal UI for managing Docker containers and services. It provides an easy-to-use interface for viewing logs, managing containers, and monitoring resource usage.
  - id: homebrew/core/mintoolkit
    tags: [container, security, optimization]
    info: >-
      mintoolkit (previously slimtoolkit) is a suite of tools to analyze, optimize, and secure Docker images. It helps reduce container size by up to 30x, minimize attack surface, and improve deployment efficiency by automatically removing unnecessary components from images through static and dynamic analysis.
  - id: homebrew/cask/orbstack
    tags: [container, virtualization, macos]
    info: >-
      OrbStack is a fast, light, and simple way to run Docker containers and Linux machines on macOS. It's designed as a more efficient alternative to Docker Desktop with better performance.
  - id: homebrew/cask/rancher
    tags: [kubernetes, container, management]
    info: >-
      Rancher Desktop is a Kubernetes and container management tool for the desktop. It provides a lightweight, easy-to-use interface for running and managing Kubernetes clusters on your local machine.
  - id: homebrew/core/rancher-cli
    tags: [kubernetes, container, command-line]
    info: >-
      The Rancher CLI is a unified tool to manage your Rancher server. It provides a consistent interface for interacting with Rancher resources, making it easier to manage your Kubernetes clusters.
  - id: homebrew/core/skopeo
    tags: [container]
    info: >-
      Skopeo is a command-line utility that performs various operations on container images and image repositories. It can copy, inspect, delete, and sign container images without needing a daemon.
- id: db
  name: Databases & Data Tools
  desc: Tools for managing databases and manipulating data formats like JSON, YAML, and CSV.
  packages:
  - id: homebrew/core/csvq
    tags: [data, sql, command-line]
    info: >-
      csvq is a command-line tool that allows SQL-like queries on CSV files. It's useful for data analysis and manipulation without needing to import data into a database.
  - id: homebrew/core/jq
    tags: [data, json, command-line, filter]
    info: >-
      jq is a lightweight and flexible command-line JSON processor. It's like sed for JSON data - you can use it to slice, filter, map, and transform structured data with ease.
  - id: homebrew/core/jqp
    tags: [data, json, command-line, filter, terminal]
    info: >-
      jqp is a TUI (Terminal User Interface) playground for experimenting with jq queries. It provides an interactive environment to test jq expressions on JSON data with real-time results.
  - id: homebrew/core/sqlite
    tags: [data, sql]
    info: >-
      SQLite is a C-language library that implements a small, fast, self-contained, high-reliability, full-featured, SQL database engine. This package provides the command-line interface to interact with SQLite databases.
  - id: homebrew/core/yq
    tags: [data, json, command-line]
    info: >-
      yq is a lightweight and portable command-line YAML, JSON, XML, CSV and properties processor. It uses jq-like syntax but works with various data formats, making it a versatile tool for data manipulation.
  - id: homebrew/core/libucl
    tags: [data, json, development]
    info: >-
      libucl is a universal configuration language parser and library. It supports structured configuration data with JSON-like syntax, macros, includes, validation, and multiple output formats.
  - id: homebrew/core/dolt
    tags: [data, git, sql, version-control]
    info: >-
      Dolt is a SQL database that you can fork, clone, branch, merge, push, and pull just like a Git repository.  It enables collaborative data workflows and version control for structured data. To start Dolt as a background service: `brew services start dolt` Or run manually: `/opt/homebrew/opt/dolt/bin/dolt sql-server`
- id: devutil
  name: Development Utilities
  desc: Tools and utilities for software development, building, and analysis across programming languages.
  packages:
  - id: homebrew/core/editorconfig
    tags: [development, editor]
    info: >-
      EditorConfig helps maintain consistent coding styles for multiple developers working on the same project across various editors and IDEs. It defines and maintains consistent coding conventions through a simple configuration file.
  - id: homebrew/core/gradle
    tags: [build, java, development]
    info: >-
      Gradle is a build automation tool for multi-language software development. It provides build scripting using Groovy or Kotlin DSL and is especially popular for Java projects, including Android development.
  - id: homebrew/core/leiningen
    tags: [build, runtime]
    info: >-
      Leiningen is the easiest way to use Clojure. With a focus on project automation and declarative configuration, it gets out of your way and lets you focus on your code.
  - id: homebrew/core/maven
    tags: [build, java]
    info: >-
      Apache Maven is a software project management and comprehension tool. Based on the concept of a project object model (POM), Maven can manage a project's build, reporting and documentation from a central piece of information.
  - id: homebrew/core/openapi-generator
    tags: [build, java]
    info: >-
      OpenAPI Generator is a community-driven project that generates API client libraries, server stubs, and API documentation from an OpenAPI Specification. It supports various programming languages and frameworks.
  - id: homebrew/core/swagger-codegen
    tags: [build, java, api]
    info: >-
      Swagger Codegen generates client libraries, server stubs, and API documentation from OpenAPI specifications. It supports many programming languages and frameworks for API development.
  - id: homebrew/core/tree-sitter
    tags: [development, programming]
    info: >-
      Tree-sitter is an incremental parsing library that can build and update syntax trees for a source file as the file is edited. It's used by text editors for syntax highlighting and code analysis.
  - id: homebrew/core/tree-sitter-cli
    tags: [development, programming, command-line]
    info: >-
      Tree-sitter CLI is a command-line tool for generating and testing Tree-sitter parsers. It helps developers create grammar parsers for programming languages.
  - id: homebrew/core/vite
    tags: [build, javascript, development]
    info: >-
      Vite is a fast frontend build tool and development server for modern web projects. It provides instant dev server startup, hot module replacement, and optimized production builds.
  - id: homebrew/core/repomix
    tags: [development, ai, command-line]
    info: >-
      Repomix is a tool that packs repository contents into a single AI-friendly file. It helps prepare code repositories for AI analysis by combining files into a structured format that's easy for AI models to process and understand.
  - id: wstein/tap/cx-cli
    desc: Repository-native toolchain for live MCP workspaces, durable notes, and verifiable AI handoffs
    tags: [development, ai, command-line]
    info: >-
      cx-cli is a repository-native toolchain for agent-assisted development: it exposes live MCP workspace access, maintains durable project notes, and produces verifiable bundle artifacts for AI handoff. Its goal is to keep exploration, memory, and proof aligned so agents, developers, and CI can inspect the same trusted project context over time.
  - id: homebrew/core/cargo-generate
    tags: [development, rust, build]
    info: >-
      cargo-generate is a tool that uses pre-existing Git repositories as templates to bootstrap new Rust projects. It allows developers to quickly create new projects based on established patterns and structures, supporting variable substitution and customization during project generation.
  - id: homebrew/core/specify
    tags: [development, testing, python, ai]
    info: >-
      Specify is a toolkit designed to help you get started with Spec-Driven Development. It provides opinionated tooling and templates to scaffold and run specifications, with integrations for Python-based workflows (requires python@3.13).
  - id: homebrew/core/kondo
    tags: [development, file-management, rust]
    info: >-
      Kondo is a tool for cleaning non-essential files from software projects to save disk space. It identifies and removes build artifacts, dependencies, and other generated files from various project types, helping developers reclaim storage space without affecting source code.
  - id: homebrew/cask/local
    tags: [wordpress, development, productivity]
    info: >-
      Local is a local WordPress development environment for Mac and Windows. It simplifies WordPress development by providing an easy-to-use interface to create, test, and deploy WordPress sites locally. It includes built-in tools for database management, file editing, and site publishing.
- id: file-nav
  name: File Navigation & Search
  desc: Tools for searching, navigating, and exploring file systems and directories.
  packages:
  - id: homebrew/core/fd
    tags: [file-management, search, command-line]
    info: >-
      fd is a simple, fast, and user-friendly alternative to the find command. It offers sensible defaults for most use cases and has convenient syntax for filtering and matching.
  - id: homebrew/core/fzf
    tags: [search, command-line, filter]
    info: >-
      fzf is a general-purpose command-line fuzzy finder. It's an interactive Unix filter for command-line that can be used with any list: files, command history, processes, hostnames, git commits, etc.
  - id: homebrew/core/ripgrep
    tags: [search, command-line]
    info: >-
      ripgrep (rg) is a line-oriented search tool that recursively searches your current directory for a regex pattern. It's similar to grep, but much faster and respects gitignore rules.
  - id: homebrew/core/sd
    tags: [text-processing, command-line]
    info: >-
      sd is an intuitive find & replace command-line tool. It's an alternative to sed with more user-friendly syntax for common text replacement tasks, making it easier to perform complex find and replace operations.
  - id: homebrew/core/tre-command
    tags: [file-management, command-line]
    info: >-
      tre is an improved version of the tree command, showing directory structures in a tree-like format. It's useful for visualizing file hierarchies and navigating directories more efficiently.
  - id: homebrew/core/tree
    tags: [file-management, command-line, visualization]
    info: >-
      tree is a recursive directory listing command that produces a depth-indented listing of files. It's useful for visualizing directory structures in a more intuitive way than ls.
  - id: homebrew/core/yazi
    tags: [terminal, file-management, rust]
    info: >-
      Yazi is a blazing fast terminal file manager written in Rust and based on async I/O. It provides an intuitive interface for navigating and managing files with high performance and customizable features.
- id: file-util
  name: File System Utilities
  desc: Tools for monitoring disk usage, file operations, and system file management.
  packages:
  - id: homebrew/core/duck
    tags: [command-line]
    info: >-
      duck is a command-line interface for Cyberduck, providing file transfer capabilities across multiple protocols including FTP, SFTP, WebDAV, S3, and more. It enables scripted and automated file transfers with various cloud storage services.
  - id: homebrew/core/duf
    tags: [monitoring, command-line, file-system]
    info: >-
      duf is a disk usage/free utility that provides a more intuitive and user-friendly way to see disk usage information. It's a modern alternative to the traditional df command.
  - id: homebrew/core/dust
    tags: [monitoring, command-line, file-system]
    info: >-
      dust is a more intuitive version of du (disk usage) written in Rust. It provides a colorful and user-friendly way to see which directories are using disk space.
  - id: homebrew/core/lsd
    tags: [file-management, command-line]
    info: >-
      lsd is a modern replacement for the ls command, offering colorful output, file type icons, and tree view functionality. It provides a more visually appealing way to browse directories with Git integration and customizable themes.
  - id: homebrew/core/moreutils
    tags: [command-line]
    info: >-
      moreutils is a collection of useful Unix tools that aren't included in the standard utilities. It includes tools like sponge, vidir, ts, combine, and more to enhance your command-line workflow.
  - id: homebrew/core/ncdu
    tags: [monitoring, command-line, file-system]
    info: >-
      ncdu is a disk usage analyzer with an ncurses interface. It provides an interactive way to browse and analyze disk usage, making it easier to identify which directories are consuming the most space.
  - id: homebrew/core/watch
    tags: [monitoring, command-line, visualization]
    info: >-
      watch is a command-line tool that runs a specified command repeatedly, displaying its output fullscreen. It's useful for monitoring changing data or processes in real-time.
  - id: homebrew/core/watchman
    tags: [development, automation]
    info: >-
      Watchman is a file watching service that can trigger actions when files change. It's optimized for performance and reliability, making it ideal for development workflows and build tools that need to respond to file changes.
  - id: homebrew/core/dua-cli
    tags: [monitoring, command-line, file-system, rust]
    info: >-
      dua-cli is a fast disk usage analyzer written in Rust. It provides an interactive way to view disk space usage and delete unwanted data, making it easier to clean up and manage storage.
  - id: homebrew/core/entr
    tags: [development, automation, file-management]
    info: >-
      entr is a utility for running arbitrary commands when files change. It's useful for development workflows where you want to automatically rebuild, test, or reload when source files are modified.
  - id: homebrew/cask/openzfs
    tags: [file-system, storage, utility]
    info: >-
      OpenZFS on OS X provides the ZFS file system and utilities for macOS. It enables advanced file system features such as snapshots, data integrity verification, and efficient storage management. License: OpenZFS Formula: https://github.com/Homebrew/homebrew-cask/blob/HEAD/Casks/o/openzfs.rb Note: Requires a kernel extension to work. See vendor documentation for details.
  - id: homebrew/core/coreutils
    tags: [command-line, file-management, system]
    info: >-
      GNU Coreutils is a collection of basic file, shell, and text utilities for Unix-like systems, providing commands such as ls, cp, mv, rm, sort, cut, and more. On macOS these tools are installed with a 'g' prefix (e.g., gls); you can add the package's gnubin directory to your PATH to use the standard (unprefixed) command names.
- id: fonts
  name: Fonts
  desc: Typography and font packages for coding and document preparation.
  packages:
  - id: homebrew/cask/font-hack-nerd-font
    tags: [programming]
    info: >-
      Hack Nerd Font is a programmer's font with a high number of glyphs (icons). It's designed to be a clean, distinctive, and readable monospace font that includes programming ligatures and specialized icons useful for coding.
  - id: homebrew/cask/font-caskaydia-cove-nerd-font
    tags: [programming]
    info: >-
      CaskaydiaCove Nerd Font is based on Microsoft's Cascadia Code font with added Nerd Font icons. It's designed specifically for programming with excellent readability and includes all the glyphs needed for modern terminal and coding environments.
  - id: homebrew/cask/font-fira-code-nerd-font
    tags: [programming]
    info: >-
      FiraCode Nerd Font combines the popular Fira Code font with programming ligatures and Nerd Font icons. It provides excellent readability and includes special character combinations that make code more visually appealing and easier to read.
  - id: homebrew/cask/font-jetbrains-mono-nerd-font
    tags: [programming]
    info: >-
      JetBrainsMono Nerd Font is based on JetBrains Mono with added Nerd Font icons and glyphs. It's specifically designed for developers, with increased height for better readability and distinctive characters to reduce eye strain during long coding sessions.
  - id: homebrew/cask/font-noto-sans
    tags: [typography]
    info: >-
      Noto Sans is part of Google's Noto font family, designed to support all languages with a harmonious look and feel. It provides excellent readability and comprehensive Unicode coverage, making it suitable for multilingual documents and international typography.
  - id: homebrew/cask/font-oxygen
    tags: [typography]
    info: >-
      Oxygen is a clean, modern font family designed for the KDE desktop environment. It features excellent readability and a contemporary design that works well for both screen and print use, with regular, light, and bold weights available.
- id: git
  name: Git Tools
  desc: Git-specific utilities, extensions, and interfaces for enhanced Git workflows.
  packages:
  - id: homebrew/core/git
    tags: [version-control, command-line, scm]
    info: >-
      git is a free and open source distributed version control system designed to handle everything from small to very large projects with speed and efficiency. It enables collaboration, code review, and maintains complete project history locally.
  - id: homebrew/core/ugit
    tags: [git, version-control, command-line]
    info: >-
      ugit is a utility that allows you to easily undo Git commands. It serves as a safety net for when you make mistakes in Git, providing a simple way to reverse potentially harmful operations. Note that it conflicts with git-extras as both install `git-undo` binaries.
  - id: homebrew/core/forgit
    tags: [git, command-line, search]
    info: >-
      forgit is a utility that leverages fzf to enhance git commands, providing interactive interfaces for git add, git diff, git log, git blame, and more. It makes Git operations more intuitive and visual in the terminal.
  - id: homebrew/core/gh
    tags: [git, github, command-line]
    info: >-
      GitHub CLI (gh) brings GitHub to your terminal. It allows you to manage issues, pull requests, releases, and other GitHub features directly from the command line.
  - id: homebrew/cask/git-credential-manager
    tags: [git, security, credentials]
    info: >-
      Git Credential Manager securely stores your Git credentials and handles authentication for Git operations. It supports various authentication methods including multi-factor authentication for GitHub, Azure DevOps, and other services.
  - id: homebrew/core/git-absorb
    tags: [git, version-control, workflow]
    info: >-
      git-absorb is a tool that automatically creates fixup commits for your staged changes, matching them with their correct commits. It makes it easier to maintain a clean git history by identifying which previous commits should be fixed.
  - id: homebrew/core/git-branchless
    tags: [git, version-control, workflow]
    info: >-
      git-branchless provides a high-velocity, monorepo-scale workflow for Git. It enables a more efficient workflow with features like smart branch management and improved navigation of commit history.
  - id: homebrew/core/git-cliff
    tags: [git, documentation]
    info: >-
      git-cliff is a highly customizable changelog generator that creates changelogs based on Git history. It parses conventional commits to automatically generate structured release notes and version histories. It supports custom templates, filtering options, and integrates well with CI/CD pipelines.
  - id: homebrew/core/git-delta
    tags: [git, command-line]
    info: >-
      git-delta is a syntax-highlighting pager for git and diff output. It provides an enhanced viewing experience for git diffs with syntax highlighting, line numbering, and side-by-side comparisons. It helps make code reviews and diff inspection more readable and efficient.
  - id: homebrew/core/git-gui
    tags: [git, interface, version-control]
    info: >-
      git-gui is a Tcl/Tk based graphical user interface to Git. It's included with Git and provides a simple interface for common Git operations like committing changes and browsing history.
  - id: homebrew/core/git-ignore
    tags: [git, version-control]
    info: >-
      git-ignore is a tool for working with .gitignore templates. It allows you to list, fetch, and generate .gitignore files for various programming languages and environments, making it easier to exclude unwanted files from your git repositories.
  - id: homebrew/core/git-lfs
    tags: [git, version-control, storage]
    info: >-
      Git Large File Storage (LFS) is a Git extension that replaces large files with text pointers while storing the file contents on a remote server. It's designed to handle large files more efficiently in Git repositories.
  - id: homebrew/core/git-fresh
    tags: [git, version-control, workflow]
    info: >-
      git-fresh is a utility that helps keep git repositories fresh by removing merged branches, cleaning up remote tracking branches, and pruning remote references. It's useful for maintaining clean repository history.
  - id: homebrew/core/git-filter-repo
    tags: [git, version-control, workflow]
    info: >-
      git-filter-repo is a versatile tool for rewriting git history. It's a powerful alternative to git-filter-branch that's faster and more feature-rich, useful for repository cleanup and migration.
  - id: homebrew/core/git-graph
    tags: [git, version-control, visualization]
    info: >-
      git-graph is a command-line tool that displays clear and organized Git graphs tailored to your branching model. It provides visual representations of your Git history that are easy to understand and interpret, making it simpler to track branch evolution and commit relationships.
  - id: homebrew/core/git-secrets
    tags: [git, security, encryption]
    info: >-
      git-secrets prevents you from committing passwords and other sensitive information to a git repository. It scans commits, commit messages, and merges for prohibited patterns.
  - id: homebrew/core/git-sizer
    tags: [git, version-control]
    info: >-
      git-sizer computes various size metrics for a Git repository, helping you identify which parts of your repository are taking up the most space and how they're distributed.
  - id: homebrew/core/gitleaks
    tags: [git, security, encryption]
    info: >-
      Gitleaks is a SAST tool for detecting and preventing secrets in git repos. It scans repositories for API keys, passwords, and other sensitive information that shouldn't be committed.
  - id: homebrew/core/git-recent
    tags: [git, version-control, window-management]
    info: >-
      git-recent displays your latest local git branches in a formatted and visually appealing manner. It helps you quickly identify and switch to recently used branches, making git workflow more efficient.
  - id: homebrew/core/git-secret
    tags: [git, security, encryption]
    info: >-
      git-secret enables you to store private data inside a git repository by encrypting files with GPG. The encrypted files can be safely shared in public repositories while only authorized users with the proper GPG keys can decrypt them.
  - id: homebrew/core/git-spice
    tags: [git, version-control, workflow]
    info: >-
      Git Spice is a tool for working with stacked Git branches. It provides commands to create, update, and manage stacks of related branches, making complex feature development and code reviews more efficient.
  - id: homebrew/core/git-who
    tags: [git, version-control]
    info: >-
      Git Who extends Git's blame functionality to work on entire file trees rather than individual files. It helps you understand who wrote which parts of your codebase, providing insights about code ownership across multiple files.
  - id: homebrew/cask/gitkraken
    tags: [git, interface, version-control]
    info: >-
      GitKraken is a powerful Git GUI client for Windows, Mac, and Linux. It makes Git easier, safer, and more powerful with features like visual commit history, merge conflict resolution tools, and integrations with GitHub, GitLab, and Bitbucket.
  - id: homebrew/cask/gitkraken-cli
    tags: [git, command-line, version-control]
    info: >-
      GitKraken CLI provides command-line access to GitKraken features, allowing you to integrate GitKraken's functionality into your terminal workflow and scripts.
  - id: homebrew/core/gitless
    tags: [git, version-control, workflow]
    info: >-
      Gitless is a version control system built on top of Git, designed to be easier to learn and use. It simplifies Git's complexity while maintaining its power for those who find Git's interface challenging.
  - id: homebrew/core/gitui
    tags: [git, version-control, interface]
    info: >-
      GitUI is a blazing fast terminal-based UI for Git written in Rust. It provides a visual interface for Git operations in the terminal with keyboard-driven navigation and a responsive interface.
  - id: homebrew/cask/gitup-app
    tags: [git, interface, version-control]
    info: >-
      GitUp is a Git interface focused on visual interaction. It offers a unique way to visualize and manage Git repositories with features like live branching, quick undo/redo, and a visual commit graph for easier repository navigation.
  - id: homebrew/core/gitversion
    tags: [git, automation]
    info: >-
      GitVersion is a tool that generates a Semantic Version number based on your Git repository history. It works with various Git workflows and can be integrated into build processes to automate version numbering.
  - id: homebrew/core/hub
    tags: [git, github, command-line, workflow]
    info: >-
      hub is a command-line tool that wraps Git to provide additional functionality when working with GitHub. It makes it easier to clone repositories, create pull requests, and interact with GitHub from the terminal.
  - id: homebrew/core/lazygit
    tags: [git, version-control, interface]
    info: >-
      Lazygit is a simple terminal UI for Git commands, written in Go. It provides an intuitive interface for managing branches, staging changes, and committing, all within your terminal.
  - id: homebrew/core/tea
    tags: [git, command-line, automation]
    info: >-
      tea is the official CLI tool for Gitea, a self-hosted Git service. It allows you to manage issues, pull requests, and other Gitea features from the command line, similar to GitHub's gh tool.
  - id: homebrew/core/ungit
    tags: [git, interface, version-control]
    info: >-
      Ungit is a web-based Git interface that provides an easy-to-use visual representation of your Git repository. It makes Git accessible to users who prefer graphical interfaces over command-line tools.
  - id: homebrew/core/jj
    tags: [version-control, git]
    info: >-
      JJ is a Git-compatible distributed version control system. It aims to provide a simpler, more powerful interface for managing changes and branches, while remaining interoperable with Git repositories.
- id: editor
  name: IDE & Editors
  desc: Text editors, integrated development environments, and coding tools.
  packages:
  - id: homebrew/cask/asciidocfx
    tags: [editor, publishing]
    info: >-
      AsciiDocFX is a book/document editor to build PDF, Epub, Mobi and HTML books, documents and slides. It provides a live preview and various export options for AsciiDoc documents.
  - id: homebrew/cask/jetbrains-toolbox
    tags: [ide, development]
    info: >-
      JetBrains Toolbox App is a control panel for your JetBrains tools. It helps you manage IDEs like IntelliJ IDEA, PyCharm, WebStorm, and others, keeping them updated and organized.
  - id: homebrew/cask/cursor
    tags: [editor, ide, ai]
    info: >-
      Cursor is a desktop application that integrates code editing with AI-assisted features for writing and browsing code. It provides an editor-centric experience with tools to speed up development workflows.
  - id: homebrew/core/jupyterlab
    tags: [interactive, python, ide]
    info: >-
      JupyterLab is a next-generation web-based user interface for Project Jupyter. It enables you to work with documents and activities such as Jupyter notebooks, text editors, terminals, and custom components in a flexible, integrated, and extensible manner.
  - id: homebrew/cask/meld
    tags: [editor, diff, merge]
    info: >-
      Meld is a visual diff and merge tool that helps you compare files, directories, and version controlled projects. It's particularly useful for reviewing code changes and resolving merge conflicts.
  - id: homebrew/core/neovim
    tags: [editor, terminal]
    info: >-
      Neovim is a refactor of Vim focused on extensibility and usability. It maintains compatibility with Vim while adding new features, better plugin support, and improved user experience.
  - id: homebrew/core/helix
    tags: [editor, terminal]
    info: >-
      Helix is a post-modern modal text editor built in Rust for the terminal. It features tree-sitter integration for robust syntax-aware editing, multiple selections as a core primitive, language-server support, and modern builtin editing features. (source: https://helix-editor.com)
  - id: homebrew/cask/windsurf
    tags: [ide, ai, development, editor]
    info: >-
      Windsurf is an agentic IDE powered by the AI Flow paradigm. It provides intelligent code completion, code generation, and code analysis to help you write better code faster.
  - id: homebrew/cask/zed
    tags: [editor]
    info: >-
      Zed is a high-performance, multiplayer code editor from the creators of Atom and Tree-sitter. It's built to be fast, collaborative, and extensible with a modern user interface.
  - id: homebrew/cask/visual-studio-code
    tags: [editor, development, ide]
    info: >-
      Visual Studio Code is a lightweight but powerful source code editor developed by Microsoft. It includes support for debugging, embedded Git control, syntax highlighting, intelligent code completion, snippets, and code refactoring with a rich ecosystem of extensions.
- id: k8s
  name: Kubernetes Tools
  desc: Tools for interacting with and managing Kubernetes clusters and resources.
  packages:
  - id: homebrew/core/helm
    tags: [kubernetes, deployment, package-manager]
    info: >-
      Helm is the package manager for Kubernetes. It helps you define, install, and upgrade even the most complex Kubernetes applications, making deployment management easier.
  - id: homebrew/core/k9s
    tags: [kubernetes, monitoring]
    info: >-
      K9s is a terminal-based UI to interact with your Kubernetes clusters. It provides a more intuitive way to navigate, observe and manage your applications, making cluster management easier.
  - id: homebrew/core/krew
    tags: [kubernetes, kubectl, package-manager]
    info: >-
      Krew is a plugin manager for kubectl, allowing you to discover and install kubectl plugins with a simple interface. It helps extend kubectl with custom commands for specific Kubernetes tasks.
  - id: homebrew/core/kubeconform
    tags: [kubernetes, testing]
    info: >-
      Kubeconform is a Kubernetes manifests validator that's extremely fast and supports custom resources. It helps catch configuration errors before applying them to your cluster.
  - id: homebrew/core/kubectx
    tags: [kubernetes, kubectl]
    info: >-
      kubectx is a utility to manage and switch between kubectl contexts easily. It's paired with kubens, which helps you switch between Kubernetes namespaces quickly.
  - id: homebrew/core/kubernetes-cli
    tags: [kubernetes, kubectl, command-line]
    info: >-
      kubectl is the command-line interface for running commands against Kubernetes clusters. It allows you to deploy applications, inspect and manage cluster resources, and view logs.
  - id: homebrew/core/okteto
    tags: [kubernetes, development, testing, deployment]
    info: >-
      Okteto accelerates Kubernetes development by letting you develop and test code directly in your Kubernetes cluster. It eliminates the need to build, push, and deploy after every code change.
  - id: homebrew/core/stern
    tags: [kubernetes, monitoring]
    info: >-
      Stern allows you to tail multiple pods and containers in Kubernetes, making it easier to view logs from multiple sources simultaneously. It's particularly useful in microservice architectures.
  - id: telepresenceio/telepresence/telepresence-oss
    tags: [kubernetes, development, testing]
    info: >-
      Telepresence allows developers to run a single service locally while connecting to a remote Kubernetes cluster. It enables faster feedback loops when developing services that are part of a larger application running in Kubernetes.
  - id: homebrew/core/kustomize
    tags: [kubernetes, deployment]
    info: >-
      Kustomize is a tool for customizing Kubernetes YAML manifests without templates. It allows you to declaratively manage Kubernetes configuration files through overlays and patches, making it easier to maintain different environments and configurations for your Kubernetes applications.
  - id: homebrew/core/kubeshark
    tags: [kubernetes, monitoring, network]
    info: >-
      Kubeshark is an API traffic analyzer that provides real-time visibility into Kubernetes network traffic. It helps developers and operators understand service interactions, debug networking issues, and monitor API communications within Kubernetes clusters with comprehensive traffic analysis.
- id: lang
  name: Programming Languages
  desc: Programming language implementations, runtimes, and interpreters for various languages.
  packages:
  - id: neved4/tap/alire
    tags: [package-manager, ada, development]
    info: >-
      Alire (alr) is a source-based package manager and build tool for the Ada and SPARK programming languages. It helps manage dependencies and build projects written in Ada.
  - id: oven-sh/bun/bun
    tags: [javascript, runtime, package-manager]
    info: >-
      Bun is an all-in-one JavaScript runtime, bundler, transpiler, and package manager designed for speed. It aims to be a drop-in replacement for Node.js with significantly better performance and additional features.
  - id: homebrew/core/clisp
    tags: [lisp, programming-language, development, runtime]
    info: >-
      GNU CLISP is an implementation of Common Lisp. It includes an interpreter, compiler, debugger, and other features, making it a complete environment for Lisp development.
  - id: homebrew/core/clojure
    tags: [programming-language, runtime, lisp]
    info: >-
      Clojure is a dynamic, functional programming language that runs on the JVM. It emphasizes immutability and provides easy access to Java libraries, making it powerful for concurrent programming.
  - id: homebrew/core/crystal
    tags: [programming-language, development]
    info: >-
      Crystal is a programming language with Ruby-like syntax but with static type checking and compilation to efficient native code. It aims to have the elegance of Ruby with the speed of C.
  - id: homebrew/core/emscripten
    tags: [compiler, javascript]
    info: >-
      Emscripten is a complete compiler toolchain to WebAssembly, allowing you to compile C and C++ code to WebAssembly for running in web browsers at near-native speed.
  - id: homebrew/core/fennel
    tags: [lisp, lua, programming-language]
    info: >-
      Fennel is a programming language that brings a Lisp syntax to Lua. It compiles to Lua, is fully compatible with Lua libraries, and is designed for embedding and scripting with a focus on simplicity and speed.
  - id: homebrew/core/groovy
    tags: [programming-language, runtime, scripting, development]
    info: >-
      Groovy is a powerful, optionally typed and dynamic language for the Java platform. It integrates smoothly with Java code and libraries, adding modern programming language features.
  - id: homebrew/core/go
    tags: [programming-language, runtime, development]
    info: >-
      Go is an open source programming language developed by Google that makes it easy to build simple, reliable, and efficient software. It features fast compilation, garbage collection, and excellent support for concurrent programming with goroutines and channels.
  - id: homebrew/core/erlang
    tags: [programming-language, runtime, development]
    info: >-
      Erlang is a programming language and runtime designed for highly available, distributed, and fault-tolerant systems. It is widely used for telecom, messaging, and concurrent server software.
  - id: homebrew/core/ipython
    tags: [python, interactive, terminal]
    info: >-
      IPython provides a rich toolkit to help you make the most out of using Python interactively. Its powerful interactive shell features easy editing, recording, and debugging, and is widely used in scientific computing.
  - id: homebrew/core/julia
    tags: [programming-language, development, runtime]
    info: >-
      Julia is a high-level, high-performance dynamic programming language for technical computing. It is especially strong for numerical work, data science, scientific computing, and interactive research.
  - id: homebrew/core/jruby
    tags: [ruby, runtime, programming-language]
    info: >-
      JRuby is an implementation of Ruby on the JVM. It allows you to run Ruby code on any Java Virtual Machine, with access to Java libraries and better threading support than MRI Ruby.
  - id: homebrew/core/llvm
    tags: [compiler, development]
    info: >-
      LLVM is a collection of modular and reusable compiler and toolchain technologies. It is widely used for developing new programming languages and optimizing compilers.
  - id: homebrew/core/lua
    tags: [lua, programming-language, scripting]
    info: >-
      Lua is a lightweight, high-level, multi-paradigm programming language designed primarily for embedded use in applications. It is fast, portable, and easy to embed.
  - id: homebrew/core/luajit
    tags: [lua, compiler, programming-language]
    info: >-
      LuaJIT is a Just-In-Time Compiler for Lua, designed to be fast and efficient. It is widely used for performance-critical applications that require Lua scripting.
  - id: homebrew/core/luarocks
    tags: [lua, package-manager]
    info: >-
      LuaRocks is the package manager for Lua modules. It allows you to install Lua libraries and manage dependencies for Lua projects easily.
  - id: homebrew/cask/graalvm-jdk
    tags: [java, development, programming-language]
    info: >-
      GraalVM Java Development Kit is Oracle's GraalVM distribution for Java development. It includes a JDK with GraalVM technologies for high-performance JVM workloads and native image workflows.
  - id: homebrew/core/node
    tags: [javascript, runtime, development]
    info: >-
      Node.js is an open-source JavaScript runtime built on Chrome's V8 engine. It is used for server-side JavaScript, command-line tools, package scripts, and frontend build ecosystems.
  - id: homebrew/core/openjdk
    tags: [java, development, programming-language]
    info: >-
      OpenJDK is the open-source reference implementation of the Java Platform, Standard Edition. It provides the Java compiler, runtime, class libraries, and development tools needed to build and run Java applications.
  - id: homebrew/core/python@3.14
    tags: [python, programming-language, development, runtime]
    info: >-
      Python 3 is a high-level programming language known for readability, a broad standard library, and a large ecosystem of packages. It is widely used for scripting, automation, web development, data science, and application development.
  - id: homebrew/core/ruby
    tags: [programming-language, development, runtime, scripting]
    info: >-
      Ruby is a dynamic, open-source programming language with a focus on simplicity and productivity. It has an elegant syntax that is natural to read and easy to write, making it popular for web development.
  - id: homebrew/core/ruby-lsp
    tags: [ruby, ide, development]
    info: >-
      Ruby LSP is an opinionated language server for Ruby. It provides editor features such as code completion, diagnostics, document symbols, formatting support, and navigation for Ruby projects.
  - id: homebrew/core/rustup
    tags: [rust, compiler, development]
    info: >-
      rustup is the Rust toolchain installer, allowing you to manage multiple Rust toolchains and switch between them with ease. It's the recommended way to install and manage Rust on your system.
  - id: homebrew/core/sbcl
    tags: [lisp, programming-language, development, compiler]
    info: >-
      Steel Bank Common Lisp (SBCL) is a high-performance Common Lisp compiler. It provides an interactive environment with an integrated native compiler, debugger, and many extensions.
  - id: homebrew/core/solargraph
    tags: [ruby, ide, development]
    info: >-
      Solargraph is a Ruby language server that provides code completion, inline documentation, and static analysis for Ruby code. It enhances development environments with intelligent features to improve productivity when working with Ruby.
  - id: homebrew/core/typescript
    tags: [javascript, programming-language, development]
    info: >-
      TypeScript is a typed superset of JavaScript that compiles to plain JavaScript. It adds static typing, editor tooling, and language features for large-scale application development.
  - id: homebrew/core/uv
    tags: [python, package-manager]
    info: >-
      uv is an extremely fast Python package installer and resolver, written in Rust. uv is designed as a drop-in replacement for pip and pip-tools workflows. It can install and resolve Python packages up to 10-100x faster than pip and pip-tools.
  - id: homebrew/core/vala
    tags: [programming-language, development]
    info: >-
      Vala is a programming language that aims to bring modern programming language features to GNOME developers without imposing additional runtime requirements. It translates to C and is designed to work with the GObject type system, making it ideal for GNOME and GTK application development with syntax similar to C# and Java.
  - id: homebrew/core/zig
    tags: [programming-language, compiler, development]
    info: >-
      Zig is a systems programming language focused on robustness, optimality, and clarity. It provides manual memory control, cross-compilation support, and a modern toolchain for low-level software.
